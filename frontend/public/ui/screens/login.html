<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 — 邻帮</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Background ambience */
  body {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: var(--space-xl);
    position: relative;
    background:
      radial-gradient(circle at 50% 28%, var(--accent-subtle), transparent 40%),
      radial-gradient(circle at 86% 82%, var(--secondary-light), transparent 32%),
      var(--bg);
    overflow-x: hidden;
  }

  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.45;
    pointer-events: none;
    z-index: -1;
  }
  body::before {
    width: 420px; height: 420px;
    background: var(--accent-subtle);
    top: -120px; right: -120px;
  }
  body::after {
    width: 360px; height: 360px;
    background: var(--secondary-light);
    bottom: -100px; left: -100px;
  }

  .auth-card {
    width: min(100%, 420px);
    background: var(--surface);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-light);
    border-top: 4px solid var(--accent);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: card-in 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }

  .auth-header {
    text-align: center;
    padding: var(--space-3xl) var(--space-2xl) var(--space-xl);
  }

  .auth-brand-mark {
    width: 64px; height: 64px;
    margin: 0 auto var(--space-lg);
    border-radius: var(--radius-xl);
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    box-shadow: 0 8px 24px oklch(54% 0.15 28 / 0.25);
    animation: mark-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
  }

  @keyframes mark-in {
    from { opacity: 0; transform: scale(0.6) rotate(-8deg); }
    to { opacity: 1; transform: none; }
  }

  .auth-header h1 {
    font-family: var(--font-display);
    font-size: 30px; font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .auth-header .sub {
    font-size: 15px; color: var(--muted);
  }

  .auth-body {
    padding: var(--space-2xl);
  }

  .field-group {
    margin-bottom: var(--space-lg);
  }

  .field-group label {
    display: block; font-size: 13px; font-weight: 700;
    color: var(--fg); margin-bottom: 7px;
    letter-spacing: 0.02em;
  }

  .field-label-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--space-sm);
    margin-bottom: 7px;
  }

  .field-label-row label { margin-bottom: 0; }

  .forgot-link {
    font-size: 13px; color: var(--muted); font-weight: 600;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--accent); }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute; left: 14px; top: 50%;
    width: 20px; height: 20px;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    transition: color 0.15s;
  }

  .input {
    width: 100%; padding: 13px 16px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); background: var(--bg);
    font-size: 15px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }

  .input.with-icon { padding-left: 44px; }
  .input::placeholder { color: var(--muted); }

  .input:hover { border-color: var(--accent-light); }
  .input:focus {
    border-color: var(--accent); background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }
  .input-wrap:focus-within .input-icon { color: var(--accent); }

  .options-row {
    display: flex; align-items: center;
    margin: var(--space-md) 0 var(--space-lg);
  }

  .remember-me {
    display: inline-flex; align-items: center; gap: var(--space-sm);
    font-size: 14px; color: var(--muted); cursor: pointer;
  }
  .remember-me input {
    width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
  }

  .auth-submit {
    width: 100%; padding: 14px; border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: var(--space-sm);
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 14px oklch(54% 0.15 28 / 0.25);
  }

  .auth-submit::after {
    content: '→';
    transition: transform 0.2s;
  }
  .auth-submit:hover { background: var(--accent-hover); }
  .auth-submit:hover::after { transform: translateX(3px); }
  .auth-submit:active { transform: scale(0.98); }
  .auth-submit:disabled { opacity: 0.7; cursor: wait; }

  .auth-footer {
    text-align: center;
    padding: 0 var(--space-2xl) var(--space-2xl);
    display: grid;
    gap: var(--space-lg);
  }

  .register-prompt {
    padding: var(--space-md) var(--space-lg);
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .register-prompt a {
    color: var(--accent); font-weight: 700;
    margin-left: 4px;
    transition: color 0.15s;
  }
  .register-prompt a:hover { color: var(--accent-hover); text-decoration: underline; }

  .footer-links {
    font-size: 13px; color: var(--muted);
  }
  .footer-links a {
    color: var(--muted); font-weight: 600;
    transition: color 0.15s;
  }
  .footer-links a:hover { color: var(--accent); }

  .auth-separator { margin: 0 var(--space-sm); color: var(--border); }

  .input.error { border-color: var(--danger); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: var(--space-md); align-items: flex-start; padding-top: 8dvh; }
    .auth-card { border-radius: var(--radius-lg); }
    .auth-header { padding: var(--space-2xl) var(--space-xl) var(--space-lg); }
    .auth-body { padding: var(--space-xl); }
    .auth-footer { padding: 0 var(--space-xl) var(--space-xl); }
    body::before { width: 280px; height: 280px; }
    body::after { width: 240px; height: 240px; }
  }
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-brand-mark" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11.5 12 4l9 7.5"/>
        <path d="M5 10.5V20h14v-9.5"/>
        <path d="M9 20v-5.5h6V20"/>
      </svg>
    </div>
    <h1>欢迎回到邻帮</h1>
    <p class="sub">邻里互助 · 时间银行</p>
  </div>

  <div class="auth-body">
    <form id="login-form" novalidate>
      <div class="field-group">
        <label for="login-username">用户名</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input class="input with-icon" id="login-username" type="text" placeholder="请输入用户名" autocomplete="username" required>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <label for="login-password">密码</label>
          <a class="forgot-link" href="#">忘记密码？</a>
        </div>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="input with-icon" id="login-password" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
      </div>

      <div class="options-row">
        <label class="remember-me">
          <input type="checkbox" id="remember-me">
          <span>记住我</span>
        </label>
      </div>

      <button class="auth-submit" id="login-submit" type="button">登录</button>
    </form>
  </div>

  <div class="auth-footer">
    <p class="register-prompt">
      还没有邻帮账号？<a href="register.html">立即注册</a>
    </p>
    <div class="footer-links">
      <a href="../index.html">返回首页</a>
      <span class="auth-separator">·</span>
      <a href="feed.html">先看看社区</a>
    </div>
  </div>
</div>

<script>
  /* Login submit */
  document.getElementById('login-submit').addEventListener('click', function() {
    var u = document.getElementById('login-username').value.trim();
    var p = document.getElementById('login-password').value;
    var userInput = document.getElementById('login-username');
    var passInput = document.getElementById('login-password');

    userInput.classList.remove('error');
    passInput.classList.remove('error');

    if (!u) {
      userInput.classList.add('error');
      shake(userInput);
      return;
    }
    if (!p) {
      passInput.classList.add('error');
      shake(passInput);
      return;
    }

    this.textContent = '登录中…';
    this.disabled = true;
    setTimeout(function() {
      window.location.href = 'feed.html';
    }, 600);
  });

  // Enter key navigation
  document.getElementById('login-username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });
  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-submit').click();
  });

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.4s ease';
  }
</script>

</body>
</html>
